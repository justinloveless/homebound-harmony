# Run the stack — Postgres + API + (optional) dev SPA:
#
#   docker compose up --build                                      # postgres + app (no host port; use Coolify/proxy or curl via network)
#   docker compose -f docker-compose.yaml -f docker-compose.local.yaml up --build   # same + http://localhost:3000 on the host
#   docker compose --profile dev up --build                        # adds Vite `web` on :5173 (see WEB_PORT)
#   docker compose --profile dev up --build web                    # dev SPA only; brings in api+postgres via depends_on
#
# `web` is gated behind the `dev` profile so it never starts on remote hosts
# like Coolify — `docker compose up` (no profile) brings up only `postgres`
# and `app`, which is the single service you should expose publicly. The
# bundled SPA inside `app` is what real users see; `web` is purely a local
# dev convenience and ships unminified code with a wider attack surface.
#
# The `app` service does not publish host ports here so platforms like Coolify
# can run production + preview stacks without "port already allocated" on :3000.
# Use docker-compose.local.yaml when you want http://localhost:3000 from Docker.
#
# Defaults: production SPA is bundled into the API image (in-container :3000).
# Dev profile: http://localhost:5173 for the Vite `web` service (override WEB_PORT).
# For a real deployment, set NODE_ENV=production behind TLS so __Host-session engages,
# and replace the example secrets in .env.
#
# Coolify previews: `SERVICE_NAME_POSTGRES` resolves to Coolify's generated
# Postgres service name for each preview stack (for example,
# postgres-<uuid>-pr-7), so the app does not need a per-PR POSTGRES_HOST value.
# If the preview URL returns 503 "no available server" while production works,
# Traefik often has no loadbalancer port for the preview stack (Coolify bug; fixed
# around v4 beta.455). Upgrade Coolify, and in the UI set the public `app` domain as
# https://your-host:3000 so the proxy targets container port 3000. As a workaround you can
# set env PORT=80 in Coolify and use a domain without :3000 so Traefik’s default :80
# backend matches (requires image user able to bind :80 — root in oven/bun is fine).

services:
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@${POSTGRES_HOST:-${SERVICE_NAME_POSTGRES:-postgres}}:5432/${POSTGRES_DB:-app}
      POSTGRES_HOST: ${POSTGRES_HOST:-${SERVICE_NAME_POSTGRES:-postgres}}
      # NODE_ENV=development keeps the cookie name plain `session` so plain
      # HTTP works locally. Switch to `production` (and front this with TLS)
      # for the __Host-session cookie.
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      APP_DOMAIN: ${APP_DOMAIN:-routecare.lovelesslabs.net}
      # SECURITY: replace these with cryptographically random values in .env
      # before exposing this service to anyone but yourself. The app validates
      # both at runtime (argon.ts / ipHash.ts) and refuses to operate without
      # them. We deliberately avoid Compose's `${VAR:?msg}` guard here because
      # Coolify's env-var discoverer treats the whole `${...}` body as a
      # variable name, producing junk keys like `TOTP_KEK:?TOTP_KEK_is_...`.
      TOTP_KEK: ${TOTP_KEK}
      IP_HASH_PEPPER: ${IP_HASH_PEPPER}
      # Optional platform admin allowlist: set `ADMIN_EMAILS` and/or `ADMIN_EMAIL` in `.env` (loaded
      # via `env_file` above) or in your host's container env (e.g. Coolify). Do not add
      # `ADMIN_EMAILS: ${ADMIN_EMAILS:-}` here — an empty interpolation overrides `env_file` and
      # clears the value inside the container.
      # Review-account seed runs on boot by default (`RUN_SEED_ON_BOOT` unset); set to false to skip.
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const p = process.env.PORT || '3000'; fetch('http://127.0.0.1:' + p + '/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Vite dev server. Gated behind the `dev` profile so plain `docker compose
  # up` (which is what Coolify runs) never starts it — the bundled SPA inside
  # `app` is what production users hit. Source is baked into the image
  # (Dockerfile target `web-dev`) rather than bind-mounted, so local file
  # changes won't hot-reload through this container; if you want HMR against
  # your laptop's files, run `npm run dev` natively instead.
  web:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: web-dev
    restart: unless-stopped
    depends_on:
      - app
    environment:
      VITE_API_PROXY_TARGET: http://app:3000
      VITE_APP_DOMAIN: ${APP_DOMAIN:-routecare.lovelesslabs.net}
    # Container always serves on Vite's hard-coded 8080 (see vite.config.ts);
    # WEB_PORT picks the host-side port (default 5173 because 8080 frequently
    # collides with Hyper-V reservations on Windows hosts).
    ports:
      - "${WEB_PORT:-5173}:8080"

volumes:
  postgres-data:
