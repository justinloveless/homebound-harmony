# Optional: publish the API on the host for local Docker (e.g. http://localhost:3000).
# Coolify and other hosts should use only docker-compose.yaml so Traefik can route
# without fixed host ports (avoids preview vs production "port already allocated").
#
#   docker compose -f docker-compose.yaml -f docker-compose.local.yaml up --build
services:
  postgres:
    ports:
      # Host-run scripts (`db:seed`) must hit this Postgres, not a local server install.
      - "127.0.0.1:${POSTGRES_PUBLISH_PORT:-55432}:5432"
  app:
    ports:
      - "${APP_PORT:-3000}:3000"
